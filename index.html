<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaruTabi</title>
<meta name="description" content="HaruTabi — Japan travel check-in app. Collect prefectures, hot springs, and landmarks across Japan.">
<link rel="icon" type="image/png" href="/icon.png">
<link rel="alternate" hreflang="zh-Hant" href="https://joshuall.github.io/zh/">
<link rel="alternate" hreflang="en" href="https://joshuall.github.io/en/">
<link rel="alternate" hreflang="ja" href="https://joshuall.github.io/ja/">
<link rel="alternate" hreflang="ko" href="https://joshuall.github.io/ko/">
<link rel="alternate" hreflang="x-default" href="https://joshuall.github.io/">
<script>
(function() {
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  var target = '/en/';
  if (lang.startsWith('zh')) target = '/zh/';
  else if (lang.startsWith('ja')) target = '/ja/';
  else if (lang.startsWith('ko')) target = '/ko/';
  location.replace(target);
})();
</script>
<meta http-equiv="refresh" content="0; url=/en/">
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#FFF8F6;color:#2A1F1F;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:24px;text-align:center}
  .box{max-width:440px}
  h1{font-size:28px;margin-bottom:8px}
  p{color:#6B5A5A;margin-bottom:24px}
  .langs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .langs a{padding:10px 18px;background:#D97B8E;color:white;text-decoration:none;border-radius:999px;font-size:14px;font-weight:500}
  .langs a:hover{background:#C5667A}
</style>
</head>
<body>
<div class="box">
  <h1>HaruTabi</h1>
  <p>Choose your language / 選擇語言 / 言語を選択 / 언어 선택</p>
  <div class="langs">
    <a href="/zh/">繁中</a>
    <a href="/en/">English</a>
    <a href="/ja/">日本語</a>
    <a href="/ko/">한국어</a>
  </div>
</div>
</body>
</html>

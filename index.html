<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaruTabi — 日本旅行打卡收集</title>
<meta name="description" content="HaruTabi 是一款日本旅行打卡 app。GPS 自動打卡 47 都道府縣與 70 個經典溫泉、22 個名勝，解鎖專屬印章，繪製你獨一無二的日本旅行地圖。">
<meta property="og:title" content="HaruTabi — 日本旅行打卡收集">
<meta property="og:description" content="踏進日本每個角落，收集屬於你的旅行印記。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://joshuall.github.io/">
<link rel="icon" type="image/png" href="icon.png">
<style>
  :root {
    --pink: #F5A6B5;
    --pink-dark: #D97B8E;
    --bg: #FFF8F6;
    --text: #2A1F1F;
    --text-muted: #6B5A5A;
    --card: #FFFFFF;
    --border: #F0E0E0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Noto Sans JP", "Noto Sans KR", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

  .lang-switcher {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 4px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 6px;
    border-radius: 999px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    z-index: 100;
  }
  .lang-switcher button {
    background: transparent;
    border: none;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 999px;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }
  .lang-switcher button:hover { background: rgba(245, 166, 181, 0.15); }
  .lang-switcher button.active {
    background: var(--pink-dark);
    color: white;
  }

  header {
    text-align: center;
    padding: 80px 24px 48px;
    background: linear-gradient(180deg, #FFE8EB 0%, var(--bg) 100%);
  }
  header img.icon {
    width: 120px;
    height: 120px;
    border-radius: 28px;
    box-shadow: 0 8px 24px rgba(217, 123, 142, 0.25);
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }
  header .tagline {
    font-size: 18px;
    color: var(--text-muted);
    max-width: 520px;
    margin: 0 auto;
  }

  .store-badges {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .store-badges a {
    display: inline-block;
    padding: 14px 28px;
    background: var(--text);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .store-badges a:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.15);
  }
  .store-badges a.disabled {
    background: #CCC;
    cursor: not-allowed;
    pointer-events: none;
  }
  .store-badges .sub {
    display: block;
    font-size: 11px;
    opacity: 0.7;
    margin-bottom: 2px;
  }

  section {
    padding: 64px 0;
    border-top: 1px solid var(--border);
  }
  h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 32px;
    text-align: center;
  }

  .features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
  }
  .feature {
    background: var(--card);
    padding: 28px 24px;
    border-radius: 16px;
    border: 1px solid var(--border);
  }
  .feature .emoji { font-size: 32px; margin-bottom: 12px; display: block; }
  .feature h3 { font-size: 17px; margin-bottom: 8px; }
  .feature p { font-size: 14px; color: var(--text-muted); }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 640px;
    margin: 0 auto;
  }
  .stat {
    text-align: center;
    padding: 24px 12px;
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
  }
  .stat .num {
    font-size: 36px;
    font-weight: 700;
    color: var(--pink-dark);
    display: block;
    line-height: 1;
  }
  .stat .label {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  footer {
    text-align: center;
    padding: 48px 24px;
    font-size: 13px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }
  footer a {
    color: var(--pink-dark);
    text-decoration: none;
    margin: 0 8px;
  }
  footer a:hover { text-decoration: underline; }
  footer .copyright { margin-top: 16px; }

  @media (max-width: 560px) {
    header { padding: 72px 24px 32px; }
    header h1 { font-size: 32px; }
    header .tagline { font-size: 16px; }
    h2 { font-size: 24px; }
    section { padding: 48px 0; }
    .stats { grid-template-columns: 1fr; }
    .lang-switcher { top: 12px; right: 12px; padding: 4px; }
    .lang-switcher button { padding: 5px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

function detectLang() {
  const saved = localStorage.getItem('harutabi_lang');
  if (saved && I18N[saved]) return saved;
  const nav = (navigator.language || 'en').toLowerCase();
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('zh')) return 'zh';
  return 'en';
}

function applyLang(lang) {
  const dict = I18N[lang] || I18N.en;
  document.documentElement.lang = dict.htmlLang;
  document.title = dict.title;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] != null) el.textContent = dict[key];
  });
  document.querySelectorAll('.lang-switcher button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  localStorage.setItem('harutabi_lang', lang);
}

document.querySelectorAll('.lang-switcher button').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

applyLang(detectLang());
</script>
